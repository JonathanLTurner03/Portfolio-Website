<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <!-- Standard favicons with media queries -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/light/favicon-32x32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/dark/favicon-32x32.png"
      media="(prefers-color-scheme: dark)"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/light/favicon-16x16.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/dark/favicon-16x16.png"
      media="(prefers-color-scheme: dark)"
    />

    <link
      rel="apple-touch-icon"
      href="/favicon/light/apple-touch-icon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="apple-touch-icon"
      href="/favicon/dark/apple-touch-icon.png"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Fallback .ico (no media query needed, browsers pick last matching) -->
    <link rel="shortcut icon" href="/favicon/dark/favicon.ico" />

    <!-- MS Tile -->
    <meta name="msapplication-config" content="/favicon/dark/browserconfig.xml" />

    <!-- Web Manifest (per-theme) -->
    <link
      rel="manifest"
      href="/favicon/light/site.webmanifest"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="manifest"
      href="/favicon/dark/site.webmanifest"
      media="(prefers-color-scheme: dark)"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turner Portfolio</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
